{% extends "base.html" %}
{% block content %}
<section class="phone-card">
  <div class="login-avatar">✈️</div>
  <h1>Web Telegram</h1>
  <p>手机号、代理、下载线程与缓存上限</p>
</section>

<section class="card">
  <h2>手机号登录</h2>
  <label>api_id</label><input id="api_id" inputmode="numeric" placeholder="123456">
  <label>api_hash</label><input id="api_hash" placeholder="api_hash">
  <label>手机号</label><input id="phone" placeholder="+8613812345678">
  <label>SOCKS5 代理</label><input id="proxy" placeholder="socks5://127.0.0.1:7890">
  <label>下载线程</label><input id="download_threads" type="number" min="1" max="128" value="16">
  <label>缓存上限(MB)</label><input id="cache_limit_mb" type="number" min="128" max="10240" value="1024">

  <div class="action-grid">
    <button onclick="startLogin()">发送验证码</button>
    <button class="green" onclick="submitCode()">提交验证码</button>
    <button class="yellow" onclick="submitPassword()">提交 2FA</button>
    <button class="danger" onclick="logoutTelegram()">退出登录</button>
  </div>
</section>
{% endblock %}
{% block scripts %}<script>loadLoginPage();</script>{% endblock %}
