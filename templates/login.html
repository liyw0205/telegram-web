{% extends "base.html" %}
{% block content %}
<section class="phone-card" aria-labelledby="loginHeroTitle">
  <div class="login-avatar">✈️</div>
  <h1 id="loginHeroTitle">Web Telegram</h1>
  <p>手机号、代理、下载线程与缓存上限</p>
</section>

<section class="card" aria-labelledby="loginConfigTitle">
  <h2 id="loginConfigTitle">手机号登录</h2>
  <label for="api_id">api_id</label><input id="api_id" inputmode="numeric" autocomplete="off" placeholder="123456">
  <label for="api_hash">api_hash</label><input id="api_hash" autocomplete="off" aria-describedby="apiHashHelp" placeholder="api_hash">
  <p id="apiHashHelp" class="sr-only">已保存时留空会沿用当前 api_hash。</p>
  <label for="phone">手机号</label><input id="phone" autocomplete="tel" placeholder="+8613812345678">
  <label for="proxy">SOCKS5 代理</label><input id="proxy" autocomplete="off" aria-describedby="proxyHelp" placeholder="socks5://127.0.0.1:7890">
  <p id="proxyHelp" class="sr-only">已保存代理时留空会沿用当前代理。</p>
  <label for="session_type">Session 类型</label>
  <select id="session_type" autocomplete="off">
    <option value="file">.session 文件</option>
    <option value="string">StringSession</option>
  </select>
  <label for="session_file">Session 文件名</label><input id="session_file" autocomplete="off" aria-describedby="sessionFileHelp" placeholder="telegram.session">
  <p id="sessionFileHelp" class="sr-only">已保存时留空会沿用当前 .session。</p>
  <label for="string_session">StringSession</label><textarea id="string_session" autocomplete="off" spellcheck="false" aria-describedby="stringSessionHelp" placeholder="导入时粘贴 StringSession，留空则沿用已保存值"></textarea>
  <p id="stringSessionHelp" class="sr-only">已保存时留空会沿用当前 StringSession。</p>
  <label for="download_threads">下载线程</label><input id="download_threads" type="number" min="1" max="128" value="16">
  <label for="cache_limit_mb">缓存上限(MB)</label><input id="cache_limit_mb" type="number" min="128" max="10240" value="1024">
  <label for="web_token">Web Token</label><input id="web_token" type="password" autocomplete="new-password" aria-describedby="webTokenHelp" placeholder="可选，保存后访问需要 Token">
  <p id="webTokenHelp" class="sr-only">已保存时留空不会修改 Web Token。</p>

  <div class="action-grid" role="group" aria-label="登录操作">
    <button type="button" class="gray" onclick="saveLoginConfig()">保存配置</button>
    <button type="button" onclick="startLogin()">发送验证码</button>
    <button type="button" class="green" onclick="submitCode()">提交验证码</button>
    <button type="button" class="yellow" onclick="submitPassword()">提交 2FA</button>
    <button type="button" class="danger" onclick="logoutTelegram()">退出登录</button>
  </div>
</section>

<section class="card" aria-labelledby="sessionMigrationTitle">
  <h2 id="sessionMigrationTitle">Session 迁移</h2>
  <div class="action-grid" role="group" aria-label="StringSession 操作">
    <button type="button" class="gray" onclick="importStringSession()">导入 StringSession</button>
    <button type="button" onclick="exportStringSession()">导出 StringSession</button>
  </div>
  <label for="sessionFileInput">.session 文件</label><input id="sessionFileInput" type="file" accept=".session" aria-describedby="sessionUploadHelp">
  <p id="sessionUploadHelp" class="sr-only">选择需要导入的 .session 文件。</p>
  <div class="action-grid" role="group" aria-label=".session 文件操作">
    <button type="button" class="gray" onclick="importSessionFile()">导入 .session</button>
    <button type="button" onclick="exportSessionFile()">导出 .session</button>
  </div>
</section>
{% endblock %}
{% block scripts %}<script>loadLoginPage();</script>{% endblock %}
