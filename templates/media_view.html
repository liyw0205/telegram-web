{% extends "base.html" %}
{% block content %}

<section class="media-view-page">
  <div class="media-view-head">
    <button class="back-btn" onclick="history.back()">‹</button>
    <div>
      <h1>媒体播放</h1>
      <p id="mediaViewStatus">准备原始媒体中...</p>
    </div>
  </div>

  <div id="mediaViewBox" class="media-view-box">
    <div class="loading-card">
      <div class="loader"></div>
      <p>正在准备原始媒体...</p>
      <div id="mediaProgressText">等待任务开始</div>
      <div class="progress-line">
        <div id="mediaProgressBar"></div>
      </div>
    </div>
  </div>
</section>

{% endblock %}

{% block scripts %}
<script>
initMediaViewPage("{{ peer }}", "{{ msg_id }}");
</script>
{% endblock %}
