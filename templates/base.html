<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title>Web Telegram</title>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <link rel="stylesheet" href="/static/css/app.css">
</head>
<body>
<header class="topbar">
  <div>
    <div class="app-title">Telegram</div>
    <div id="topStatus" class="app-subtitle">状态检查中...</div>
  </div>
  <button class="round-btn" onclick="refreshStatus()">↻</button>
</header>

<main class="page">
  {% block content %}{% endblock %}
</main>

<nav class="bottom-nav">
  <a class="{{ 'active' if active == 'chats' else '' }}" href="/chats"><span>💬</span><b>会话</b></a>
  <a class="{{ 'active' if active == 'downloads' else '' }}" href="/downloads"><span>⬇️</span><b>下载</b></a>
  <a class="{{ 'active' if active == 'login' else '' }}" href="/login"><span>👤</span><b>登录</b></a>
</nav>

<div id="toast"></div>

<script src="/socket.io/socket.io.js"></script>
<script src="/static/js/app.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
