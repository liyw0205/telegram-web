<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title>Web Telegram</title>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <link rel="stylesheet" href="/static/css/app.css">
</head>
<body>
<header class="topbar">
  <div>
    <div class="app-title">Telegram</div>
    <div id="topStatus" class="app-subtitle">状态检查中...</div>
  </div>
  <button class="round-btn" onclick="refreshStatus()">↻</button>
</header>

<main class="page">
  {% block content %}{% endblock %}
</main>

<nav class="bottom-nav">
  <a class="{{ 'active' if active == 'chats' else '' }}" href="/chats"><span>💬</span><b>会话</b></a>
  <a class="{{ 'active' if active == 'downloads' else '' }}" href="/downloads"><span>⬇️</span><b>下载</b></a>
  <a class="{{ 'active' if active == 'diagnostics' else '' }}" href="/diagnostics"><span>◷</span><b>诊断</b></a>
  <a class="{{ 'active' if active == 'login' else '' }}" href="/login"><span>👤</span><b>登录</b></a>
</nav>

<div id="toast"></div>

<div id="confirmOverlay" class="confirm-overlay" hidden>
  <section class="confirm-dialog" role="dialog" aria-modal="true" aria-labelledby="confirmTitle" aria-describedby="confirmMessage">
    <h2 id="confirmTitle">确认操作</h2>
    <p id="confirmMessage"></p>
    <div class="confirm-actions">
      <button id="confirmCancel" type="button" class="gray">取消</button>
      <button id="confirmOk" type="button" class="danger">确认</button>
    </div>
  </section>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="/static/js/app.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
