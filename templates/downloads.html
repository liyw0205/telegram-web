{% extends "base.html" %}
{% block content %}
<section class="mobile-panel" aria-labelledby="downloadsTitle">
  <div class="page-title-row">
    <div><h1 id="downloadsTitle">下载</h1><p>支持暂停、恢复、取消和分页查看文件</p></div>
    <button class="round-btn" type="button" onclick="loadDownloadsPage()" aria-label="刷新下载任务和文件" title="刷新下载任务和文件">↻</button>
  </div>

  <h2 class="section-title" id="downloadTaskTitle">任务</h2>
  <div id="downloadTaskList" class="download-list" role="list" aria-labelledby="downloadTaskTitle" aria-live="polite" aria-busy="true"></div>

  <div class="section-head">
    <h2 class="section-title" id="downloadFileTitle">已下载</h2>
    <button class="small-btn gray" type="button" onclick="loadDownloadFiles(true)" aria-label="刷新已下载文件">刷新文件</button>
  </div>
  <div id="downloadFileStatus" class="download-summary" role="status" aria-live="polite" aria-atomic="true" aria-busy="true"></div>
  <div id="downloadFileList" class="download-list" role="list" aria-labelledby="downloadFileTitle" aria-live="polite" aria-busy="true"></div>
  <div class="pager-row"><button id="downloadFileMore" class="small-btn gray" type="button" onclick="loadDownloadFiles(false)" aria-controls="downloadFileList" aria-label="加载更多已下载文件" style="display:none">加载更多</button></div>
</section>
{% endblock %}
{% block scripts %}<script>initDownloadsPage();</script>{% endblock %}
